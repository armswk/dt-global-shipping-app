<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DT GLOBAL FREIGHT (THAILAND) CO., LTD. - Booking System</title>
    
    <link rel="icon" href="https://lh3.googleusercontent.com/d/1TxFRhjwa2woXHIZnD_pCnjZ_TtAt5B0f">
    <link rel="apple-touch-icon" href="https://lh3.googleusercontent.com/d/1TxFRhjwa2woXHIZnD_pCnjZ_TtAt5B0f">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="DT Global">
    <meta name="mobile-web-app-capable" content="yes">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            /* ตั้งค่าพื้นหลังด้านหลังสุดเป็นสีน้ำเงิน เพื่อให้แถบ Status Bar ด้านบนกลืนไปกับ Header ของแอป */
            background-color: #1e3a8a; 
        }
        
        .safe-area-container {
            width: 100%;
            height: 100%;
            /* ดันเนื้อหาลงมาตามระยะรอยบาก หรือ Status Bar อัตโนมัติ */
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
            box-sizing: border-box;
            /* สีพื้นหลังของแอปหลัก (กันเห็นขอบสีน้ำเงินด้านล่าง/ข้าง) */
            background-color: #f3f4f6; 
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            -webkit-user-select: auto;
            user-select: auto;
        }
    </style>
</head>
<body>

    <div class="safe-area-container">
        <iframe 
            src="https://script.google.com/macros/s/AKfycbxE9XizHzQ4fe6BOM9b-K5mt-yS10eXsqiqbrLQmPuoZcI9xn2XdDbGswiNmPunDJUf/exec"
            allow="geolocation; microphone; camera"
            title="App Content">
        </iframe>
    </div>

</body>
</html>
